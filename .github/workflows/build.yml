# choosing to run a reduced set of LTS, current, and next, to balance coverage and execution time

name: Modified Build
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        - macOS-latest
        java:
        - 8
        - 17
        - 21
      fail-fast: false
    name: test (${{ matrix.os }}, ${{ matrix.java }})
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: zulu
        cache: maven
    - name: Maven Compile
      run: mvn -X compile -B --file pom.xml
    - name: Maven Verify
      run: mvn -X verify -B --file pom.xml
'on':
- push
- workflow_dispatch
